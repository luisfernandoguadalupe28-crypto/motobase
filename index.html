<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>MI PRIMERA PAGINA WEB - MOTOS</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: sans-serif;
            margin: 20px;
        }
        
        .light-mode {
            background: linear-gradient(180deg, black, navy);
            color: white;
        }
        
        #boton {
            width: 60px;
            height: 50px;
            font-size: 15px;
            border-radius: 15px;
            background: yellowgreen;
            cursor: pointer;
            border: none;
        }
        
        .contenedor {
            max-width: 450px;
            margin: auto;
            padding: 20px;
            border: 2px solid cyan;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.7);
        }
        
        input {
            width: 95%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
        }
        
        .btnBD {
            width: 100%;
            padding: 10px;
            cursor: pointer;
            background: linear-gradient(45deg, black, navy);
            color: white;
            border: 2px solid cyan;
            border-radius: 5px;
        }
        
        .moto-item {
            background: rgba(255, 255, 255, 0.1);
            margin-top: 10px;
            padding: 10px;
            border-left: 5px solid cyan;
            border-radius: 5px;
            text-align: left;
        }
        
        table {
            border-collapse: collapse;
            margin: auto;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
        }
        
        th,
        td {
            border: 2px solid cyan;
            padding: 10px;
        }
        
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

<body>

    <div style="text-align:center; margin-bottom: 20px;">
        <button id="boton">TEMA</button>
    </div>

    <h1 style="border: 5px solid orange; background: orange; color:black; text-align:center; padding: 10px; border-radius: 5px;">
        EL MUNDO DE LAS MOTOS
    </h1>

    <h3 style="text-align:center;">TABLA DE MOTOS</h3>
    <table>
        <tr style="background:navy;">
            <th>Moto</th>
            <th>Velocidad</th>
            <th>Cilindrada</th>
            <th>Tipo</th>
        </tr>
        <tr>
            <td>Yamaha R1</td>
            <td>300 km/h</td>
            <td>1000cc</td>
            <td>Deportiva</td>
        </tr>
    </table>

    <hr style="border: 1px solid cyan; margin-top: 30px;">

    <h2 style="text-align:center;">🏍️ BASE DE DATOS DE MOTOS (FIREBASE)</h2>
    <div class="contenedor">
        <input type="text" id="idMoto" placeholder="ID (OBLIGATORIO)">
        <input type="text" id="nombreMoto" placeholder="NOMBRE (OBLIGATORIO)">
        <input type="text" id="tipoMoto" placeholder="TIPO (OBLIGATORIO)">
        <input type="text" id="cilindradaMoto" placeholder="CILINDRADA (OBLIGATORIO)">
        <button class="btnBD" id="btnGuardar">GUARDAR</button>
        <h3>REGISTROS:</h3>
        <div id="resultado">Cargando base de datos...</div>
    </div>

    <div style="text-align:center; margin-top: 20px; margin-bottom: 40px;">
        <button id="btnMensaje" style="padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer;">Presióname 😎</button>
    </div>

    <script>
        document.getElementById("boton").onclick = function() {
            document.body.classList.toggle("light-mode");
        }

        // AQUÍ ESTÁ EL MENSAJE DE LA MOTO
        document.getElementById("btnMensaje").onclick = function() {
            alert("¡Las motos son geniales! 🏍️💨");
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js"; import { initializeFirestore, collection, addDoc, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyA7-IqmeZoepWBGSKwrv2s2nsBvklh-aeo", authDomain: "motobase-d46ea.firebaseapp.com", projectId: "motobase-d46ea", storageBucket: "motobase-d46ea.firebasestorage.app", messagingSenderId: "21356188669", appId:
        "1:21356188669:web:7175bf67161b976aa7ff94" }; const app = initializeApp(firebaseConfig); const db = initializeFirestore(app, { experimentalForceLongPolling: true }); async function guardarMoto() { const idV = document.getElementById("idMoto").value.trim();
        const nomV = document.getElementById("nombreMoto").value.trim(); const tipV = document.getElementById("tipoMoto").value.trim(); const cilV = document.getElementById("cilindradaMoto").value.trim(); if (!idV || !nomV || !tipV || !cilV) { alert("Llena
        todos los campos."); return; } try { const q = query(collection(db, "motos"), where("id", "==", idV)); const snap = await getDocs(q); if (!snap.empty) { alert("El ID ya existe."); return; } await addDoc(collection(db, "motos"), { id: idV, nombre:
        nomV, tipo: tipV, cilindrada: cilV }); alert("¡Guardado exitoso! 🚀"); document.getElementById("idMoto").value = ""; document.getElementById("nombreMoto").value = ""; document.getElementById("tipoMoto").value = ""; document.getElementById("cilindradaMoto").value
        = ""; } catch (e) { console.error(e); } } onSnapshot(collection(db, "motos"), (snapshot) => { let html = ""; if (snapshot.empty) { html = "
        <p>No hay registros todavía.</p>"; } else { snapshot.forEach((doc) => { const m = doc.data(); html += `
        <div class="moto-item">
            <b>ID:</b> ${m.id}<br>
            <b>NOMBRE:</b> ${m.nombre}<br>
            <b>TIPO:</b> ${m.tipo}<br>
            <b>CILINDRADA:</b> ${m.cilindrada}
        </div>`; }); } document.getElementById("resultado").innerHTML = html; }, (error) => { document.getElementById("resultado").innerHTML = "
        <p>Error de conexión.</p>"; }); document.getElementById("btnGuardar").addEventListener("click", guardarMoto);
    </script>
</body>

</html>
